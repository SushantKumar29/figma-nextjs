name: Figma-NextJS CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev build-essential

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Configure npm for better reliability
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set network-timeout 300000
          npm config set onnxruntime-node_binary_host_mirror https://registry.npmjs.org/-/

      - name: Install dependencies
        run: npm ci
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
          npm_config_timeout: 600000

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test
